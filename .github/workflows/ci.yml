name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Least privilege: default all jobs to read-only.
# Only the pr-preview and audit jobs elevate (see their own permissions blocks).
permissions:
  contents: read

# Cancel superseded runs for the same PR/branch so only the latest push runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files have changed to determine if we need to run CI
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: main
          filters: |
            app:
              - 'src/**'
              - 'public/**'
              - 'package*.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'postcss.config.js'
              - 'tailwind.config.js'
              - 'eslint.config.js'
              - 'index.html'
              - 'components.json'
              - '.nvmrc'
              - '.github/workflows/ci.yml'

  # Build the app. On PRs, build with the PR-specific base path so the same
  # artifact deploys straight to the preview — no rebuild in the pr-preview job.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base=${{ github.event_name == 'pull_request' && format('/hakoiri-musume/pr/{0}/', github.event.pull_request.number) || '/hakoiri-musume/' }}

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-preview-dist
          path: dist
          retention-days: 1
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Deploy PR preview. Depends only on `build`: the preview goes up as soon as
  # the app builds, without waiting for lint/typecheck/test.
  pr-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.app == 'true'

    # Elevated above the workflow default: pr-preview-action pushes to the
    # gh-pages branch and posts/updates the preview comment.
    permissions:
      contents: write
      pull-requests: write

    # Use shared concurrency group for all deployments
    concurrency:
      group: "github-pages-deployment"
      cancel-in-progress: false

    steps:
      - name: Skip deploy if PR is already closed
        id: pr-state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state="$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq .state)"
          if [[ "$state" == "open" ]]; then
            echo "open=true" >> "$GITHUB_OUTPUT"
          else
            echo "open=false" >> "$GITHUB_OUTPUT"
            echo "PR #${{ github.event.pull_request.number }} is $state. Skipping preview deploy."
          fi

      - name: Download build artifact
        if: steps.pr-state.outputs.open == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-preview-dist
          path: dist

      - name: Deploy PR Preview
        if: steps.pr-state.outputs.open == 'true'
        uses: koizuka/pr-preview-action@b03654e20a3e1a9c84309ac9a864e6ba3c4d078b # v1.1.1
        with:
          action: deploy
          source-dir: dist
          base-url: https://koizuka.github.io/hakoiri-musume
          token: ${{ secrets.GITHUB_TOKEN }}

  # Report-only dependency audit. Non-blocking: not wired into ci-summary.
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    # pull-requests:write is for the findings comment. Safe to grant: this job
    # runs no third-party code (--package-lock-only, no npm ci, no install).
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # Report-only: this job never fails CI. `--package-lock-only` audits
      # straight from the lockfile (no install). The decision comes from the
      # JSON metadata, not the exit code — a bare exit code can't tell a real
      # finding from a registry/network error, so a blip would post a false
      # "vulnerabilities" comment. result = true | false | error.
      - name: npm audit
        id: audit
        run: |
          npm audit --package-lock-only --omit=dev > audit.txt 2>&1 || true
          npm audit --package-lock-only --omit=dev --json > audit.json 2>/dev/null || true

          {
            echo '## npm audit (production deps)'
            echo '```'
            cat audit.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if ! jq -e '.metadata.vulnerabilities' audit.json > /dev/null 2>&1; then
            echo "::warning::npm audit did not produce a valid report"
            echo "result=error" >> "$GITHUB_OUTPUT"
          elif [ "$(jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' audit.json)" -gt 0 ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

      # The Actions summary is easy to miss, so surface findings as a sticky PR
      # comment: created when high+ vulnerabilities appear, removed once they
      # are resolved. Best-effort (continue-on-error) so it never blocks CI.
      - name: Comment audit findings on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          AUDIT_RESULT: ${{ steps.audit.outputs.result }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- dependency-audit -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // audit itself failed (registry/network) — don't post a false
            // finding, and don't clear a real one; just leave things as-is.
            if (process.env.AUDIT_RESULT === 'error') {
              core.warning('npm audit did not complete — skipping the PR comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (process.env.AUDIT_RESULT !== 'true') {
              // No high/critical vulnerabilities: drop a stale comment if any.
              if (existing) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
              }
              return;
            }

            const report = fs.readFileSync('audit.txt', 'utf8').trim();
            const body = [
              marker,
              '## ⚠️ Dependency Audit — 高深刻度の脆弱性を検出',
              '',
              '`npm audit` が high / critical の脆弱性を報告しました。',
              'これは report-only でマージはブロックしませんが、内容を確認してください',
              '（あわせてリポジトリの Dependabot alerts も参照）。',
              '',
              '<details><summary>npm audit output</summary>',
              '',
              '```',
              report,
              '```',
              '',
              '</details>',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # Summary job that provides a single status check for branch protection
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, build, lint, typecheck, test]
    if: always()

    steps:
      - name: Check CI Results
        run: |
          echo "Checking CI results..."
          echo "App changes:     ${{ needs.changes.outputs.app }}"
          echo "Build result:    ${{ needs.build.result }}"
          echo "Lint result:     ${{ needs.lint.result }}"
          echo "Typecheck result: ${{ needs.typecheck.result }}"
          echo "Test result:     ${{ needs.test.result }}"

          # Check if any tests were supposed to run
          if [[ "${{ needs.changes.outputs.app }}" == "true" ]]; then
            echo "Tests were executed. Checking results..."

            # Check if any job failed
            if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
              echo "❌ CI failed: One or more jobs failed"
              exit 1
            fi

            # Check if any job was cancelled
            if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
              echo "⚠️ CI cancelled: One or more jobs were cancelled"
              exit 1
            fi

            echo "✅ All checks passed!"
          else
            echo "✅ No code changes detected - skipping tests"
          fi

          echo "CI completed successfully!"
