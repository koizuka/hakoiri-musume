name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '22'

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  # Detect which files have changed to determine if we need to run CI
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: main
          filters: |
            app:
              - 'src/**'
              - 'public/**'
              - 'package*.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'postcss.config.js'
              - 'tailwind.config.js'
              - 'eslint.config.js'
              - 'index.html'
              - 'components.json'
              - '.github/workflows/ci.yml'

  test:
    name: Test and Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run type check
      run: npm run typecheck

    - name: Run lint
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dist
        path: dist/

  # Deploy PR preview (only on PRs with Node 20.x)
  pr-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      github.event_name == 'pull_request' && 
      needs.changes.outputs.app == 'true'
    
    # Use shared concurrency group for all deployments
    concurrency:
      group: "github-pages-deployment"
      cancel-in-progress: false

    steps:
      - name: Skip deploy if PR is already closed
        id: pr-state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state="$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq .state)"
          if [[ "$state" == "open" ]]; then
            echo "open=true" >> "$GITHUB_OUTPUT"
          else
            echo "open=false" >> "$GITHUB_OUTPUT"
            echo "PR #${{ github.event.pull_request.number }} is $state. Skipping preview deploy."
          fi

      - name: Checkout PR
        if: steps.pr-state.outputs.open == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        if: steps.pr-state.outputs.open == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.pr-state.outputs.open == 'true'
        run: npm ci

      - name: Build with PR-specific base path
        if: steps.pr-state.outputs.open == 'true'
        run: |
          # Create a temporary vite config for PR preview
          cat > vite.config.pr.ts << 'EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'
          import path from 'path'

          export default defineConfig({
            plugins: [react()],
            base: '/hakoiri-musume/pr/${{ github.event.pull_request.number }}/',
            resolve: {
              alias: {
                '@': path.resolve(__dirname, './src'),
              },
            },
          })
          EOF

          # Build with the PR-specific config
          npx vite build --config vite.config.pr.ts

      - name: Deploy PR Preview
        if: steps.pr-state.outputs.open == 'true'
        uses: koizuka/pr-preview-action@942966838e8175992f5fa468d7f6a640479c3c85 # v1.1.0
        with:
          action: deploy
          source-dir: dist
          base-url: https://koizuka.github.io/hakoiri-musume
          token: ${{ secrets.GITHUB_TOKEN }}

  # Summary job that provides a single status check for branch protection
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()

    steps:
      - name: Check CI Results
        run: |
          echo "Checking CI results..."
          echo "App changes: ${{ needs.changes.outputs.app }}"

          # Check if any tests were supposed to run
          if [[ "${{ needs.changes.outputs.app }}" == "true" ]]; then
            echo "Tests were executed. Checking results..."
            
            # Check if any job failed
            if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
              echo "❌ CI failed: One or more tests failed"
              exit 1
            fi
            
            # Check if any job was cancelled
            if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
              echo "⚠️ CI cancelled: One or more jobs were cancelled"
              exit 1
            fi
            
            echo "✅ All tests passed!"
          else
            echo "✅ No code changes detected - skipping tests"
          fi

          echo "CI completed successfully!"
