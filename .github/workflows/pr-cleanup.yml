name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

# Use shared concurrency group for all deployments
concurrency:
  group: "github-pages-deployment"
  cancel-in-progress: false

jobs:
  cleanup:
    name: Remove PR Preview
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup PR Preview
        uses: koizuka/pr-preview-action@b03654e20a3e1a9c84309ac9a864e6ba3c4d078b # v1.1.1
        with:
          action: cleanup
          base-url: https://koizuka.github.io/hakoiri-musume
          token: ${{ secrets.GITHUB_TOKEN }}
