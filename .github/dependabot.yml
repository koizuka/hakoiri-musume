version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: "npm"
      include: "scope"
    groups:
      # Reactй–ўйЂЈгЃ®гѓ‘гѓѓг‚±гѓјг‚ё
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@testing-library/react"
      # Tailwind CSSй–ўйЂЈ
      tailwindcss:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwindcss-*"
      # ESLint core (eslintжњ¬дЅ“гЃЁ@eslint/*)
      eslint-core:
        patterns:
          - "eslint"
          - "@eslint/*"
      # ESLint plugins (eslint-*гЃЁtypescript-eslint)
      eslint-plugins:
        patterns:
          - "eslint-*"
          - "typescript-eslint"
      # Radix UIй–ўйЂЈ
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # TypeScriptй–ўйЂЈ
      typescript:
        patterns:
          - "typescript"
      # Viteй–ўйЂЈ
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      # Testingй–ўйЂЈ
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "github-actions"
      include: "scope"
